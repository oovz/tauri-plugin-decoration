name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve and verify the release tag
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      sha: ${{ steps.release.outputs.sha }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve immutable tag commit
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TAG="$REQUESTED_TAG"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag is not a v-prefixed semantic version: $TAG" >&2
            exit 1
          fi
          if ! git show-ref --verify --quiet "refs/tags/$TAG"; then
            echo "release tag does not exist: $TAG" >&2
            exit 1
          fi
          SHA="$(git rev-parse --verify "refs/tags/${TAG}^{commit}")"
          git checkout --detach "$SHA"
          bash .github/scripts/verify-release.sh "$TAG" "$SHA"
          printf 'tag=%s\n' "$TAG" >> "$GITHUB_OUTPUT"
          printf 'sha=%s\n' "$SHA" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate the tagged commit
    needs: resolve
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ needs.resolve.outputs.sha }}

  publish:
    name: Publish to crates.io
    needs: [resolve, validate]
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out the resolved commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag, commit, and crate version
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: bash .github/scripts/verify-release.sh "$RELEASE_TAG" "$RELEASE_SHA"

      - name: Install Linux prerequisites
        shell: bash
        run: |
          sudo add-apt-repository --yes universe
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Rust 1.88
        shell: bash
        run: rustup toolchain install 1.88.0 --profile minimal

      - name: Request a short-lived crates.io token
        id: crates-io-auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: Publish the verified crate
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: cargo +1.88.0 publish --locked

  github-release:
    name: Create GitHub release
    needs: [resolve, publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Check out the resolved commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve.outputs.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag, commit, and crate version
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.resolve.outputs.sha }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: bash .github/scripts/verify-release.sh "$RELEASE_TAG" "$RELEASE_SHA"

      - name: Create release from the existing tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          arguments=(
            "$RELEASE_TAG"
            --verify-tag
            --generate-notes
            --title "$RELEASE_TAG"
          )
          if [[ "${RELEASE_TAG%%+*}" == *-* ]]; then
            arguments+=(--prerelease)
          fi
          gh release create "${arguments[@]}"
