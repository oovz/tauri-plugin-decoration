name: Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Immutable commit to validate
        required: false
        type: string

permissions: {}

concurrency:
  group: validation-${{ github.workflow }}-${{ inputs.ref || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-ref:
    name: Validate reusable-workflow input
    runs-on: ubuntu-24.04
    steps:
      - name: Require a full lowercase commit SHA
        shell: bash
        env:
          IMMUTABLE_REF: ${{ inputs.ref }}
        run: |
          if [[ -n "$IMMUTABLE_REF" && ! "$IMMUTABLE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            echo "workflow input ref must be a full lowercase commit SHA" >&2
            exit 1
          fi

  native:
    name: ${{ matrix.os }} / Rust 1.77.2
    needs: validate-ref
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - windows-2022
          - macos-15
    steps:
      - name: Check out the validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Linux prerequisites
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo add-apt-repository --yes universe
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Rust 1.77.2
        shell: bash
        run: rustup toolchain install 1.77.2 --profile minimal --component clippy,rustfmt

      - name: Check formatting
        if: runner.os == 'Linux'
        shell: bash
        run: cargo +1.77.2 fmt --all -- --check

      - name: Run strict Clippy
        shell: bash
        run: |
          cargo +1.77.2 clippy --locked --all-targets --all-features -- -D warnings
          cargo +1.77.2 clippy --locked --manifest-path examples/tauri-app/src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Run Rust tests
        shell: bash
        run: |
          cargo +1.77.2 test --locked --all-features
          cargo +1.77.2 test --locked --manifest-path examples/tauri-app/src-tauri/Cargo.toml

      - name: Compile the minimum Tauri 2.9 fixture
        shell: bash
        env:
          CARGO_TARGET_DIR: target/compat-tauri-2.9
        run: cargo +1.77.2 check --locked --manifest-path tests/compatibility/tauri-2.9/Cargo.toml

      - name: Build documentation
        if: runner.os == 'Linux'
        shell: bash
        run: cargo +1.77.2 doc --locked --all-features --no-deps

  frontend:
    name: Frontend and example build
    needs: validate-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out the validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Linux prerequisites
        shell: bash
        run: |
          sudo add-apt-repository --yes universe
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install Rust 1.77.2
        shell: bash
        run: rustup toolchain install 1.77.2 --profile minimal

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frozen frontend dependencies
        shell: bash
        run: |
          test "$(pnpm --version)" = "11.9.0"
          pnpm install --frozen-lockfile

      - name: Test and build the embedded frontend
        shell: bash
        env:
          RUSTUP_TOOLCHAIN: 1.77.2
        run: |
          pnpm test:frontend
          pnpm --filter tauri-app build
          pnpm --filter tauri-app tauri build --no-bundle

  forward-tauri:
    name: Newest allowed Tauri compile canary
    needs: validate-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out the validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Linux prerequisites
        shell: bash
        run: |
          sudo add-apt-repository --yes universe
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install stable Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal --component clippy

      - name: Compile against the newest allowed Tauri release
        shell: bash
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow
        run: |
          cargo +stable update
          cargo +stable clippy --all-targets --all-features -- -D warnings

  workflow-lint:
    name: Lint GitHub Actions workflows
    needs: validate-ref
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out the validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install verified actionlint
        shell: bash
        run: |
          curl --fail --location --silent --show-error \
            --output actionlint_1.7.12_linux_amd64.tar.gz \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint_1.7.12_linux_amd64.tar.gz" | sha256sum --check --strict
          tar -xzf actionlint_1.7.12_linux_amd64.tar.gz actionlint
          ./actionlint

  package:
    name: Verify crate package
    needs: [native, frontend, forward-tauri, workflow-lint]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Check out the validated commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Install Linux prerequisites
        shell: bash
        run: |
          sudo add-apt-repository --yes universe
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            pkg-config

      - name: Install stable Rust
        shell: bash
        run: rustup toolchain install stable --profile minimal

      - name: Package and dry-run publication
        shell: bash
        run: |
          cargo +stable package --locked
          cargo +stable publish --dry-run --locked
